[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    node_def: NodeDef decorator and types tests
    workflow: DAWorkflow DAG model tests
    signal_manager: DASignalManager state/signal tests
    executor: DAWorkflowExecutor execution tests
    node_registry: DANodeRegistry discovery tests
    gil_safety: GIL safety and concurrency tests
    custom_paint: DAPyPainterProxy Python-facing tests