site_name: DAWorkBench
site_author: 'Chen ZongYan'
site_description: '基于工作流数据的分析工具 - 开发与使用指南'
use_directory_urls: true

# 主题
theme:
  name: material
  logo: assets/icon.png
  favicon: assets/icon.ico
  language: zh
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: 切换深色
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: 切换浅色
  features:
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.expand
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow

plugins:
  - i18n:
      languages:
        - locale: zh
          name: 中文
          default: true
  - search

# 导航 - 重构后的完整文档结构
nav:
  - 概述:
      - 项目概览: zh/overview.md
      - 项目定位与愿景: zh/index.md
      - 快速上手: zh/quick-start.md
  - 项目结构:
      - 目录结构详解: zh/project-structure.md
      - 模块职责划分: zh/dev-guide/module-dependency.md
      - 关键文件说明: zh/key-files.md
  - 开发指南:
      - 开发环境搭建: 
          - 环境配置总览: zh/build/build-instructions.md
          - 第三方库构建: zh/build/third-party-build.md
          - 主程序构建: zh/build/main-program-build.md
          - 插件构建: zh/build/plugin-build.md
          - Python环境配置: zh/build/python-environment.md
          - 构建常见错误: zh/build/common-build-errors.md
      - 开发规范:
          - 编码规范: zh/dev-guide/coding-standard.md
          - 第三方库管理: zh/dev-guide/third-party-manage.md
          - 设置类窗体规范: zh/dev-guide/settingwidget-standard.md
          - 工程组织: zh/large-cmake-project-guide.md
      - 架构说明:
          - 模块依赖关系: zh/dev-guide/module-dependency.md
          - 接口模块: zh/dev-guide/interface-module.md
          - Python/C++ 集成: zh/dev-guide/python-in-cpp.md
          - 嵌入式 Python 调试指南: zh/dev-guide/embedded-python-debugging.md
      - 核心模块:
          - 工作流模块:
              - 工作流说明: zh/dev-guide/workflow.md
              - 工作流生命周期: zh/dev-guide/workflow-lifecycle.md
              - 节点操作详解: zh/dev-guide/workflow-item-edit-in-plugin.md
          - 图元模块:
              - 可缩放图元模块: zh/dev-guide/scalable-graphic-module.md
          - 绘图模块:
              - 绘图模块概述: zh/dev-guide/figure-abstract.md
      - 主程序开发:
          - Action添加方法: zh/dev-guide/adding-action-methods.md
  - 插件开发:
      - 插件系统概述: zh/plugin-system.md
      - 插件开发指南: zh/plugin-development.md
      - 插件生命周期: zh/plugin-lifecycle.md
      - 插件数据持久化: zh/plugin-persistence.md
      - 功能定制与扩展: zh/plugin-extension.md
      - 插件项目创建: zh/dev-guide/plugin-project-create.md
      - 插件界面开发: zh/dev-guide/plugin-dev-create-ui.md
      - 插件模块详解: zh/dev-guide/plugin-module.md
  - 使用指南:
      - 使用指南概述: zh/use-guide/index.md
      - 命令行参数: zh/use-guide/command-line-arguments.md
      - 绘图功能:
          - 数据探针: zh/use-guide/plot/data-probe.md
      - 配置文件说明: zh/configuration.md
  - 最佳实践:
      - 开发最佳实践: zh/best-practices.md
      - 性能优化建议: zh/performance-tips.md
      - 常见问题解答: zh/faq.md
      - 贡献指南: zh/contribution-guide.md
  - 附录:
      - 配置文件格式: zh/appendix-config.md
      - 术语表: zh/glossary.md
      - API文档索引: zh/api-reference.md
      - 更新日志: zh/changelog.md
  - API文档:
      - 文档首页: doxygen/index.html
      - 类索引: doxygen/classes.html
      - 文件列表: doxygen/files.html

markdown_extensions:
  - meta
  - abbr
  - attr_list
  - def_list
  - footnotes
  - tables
  - md_in_html
  - toc:
      permalink: true
  - fenced_code
  - nl2br
  - admonition
  - pymdownx.highlight:
      linenums: true
      linenums_style: table
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate: true

extra_css:
  - stylesheets/extra.css